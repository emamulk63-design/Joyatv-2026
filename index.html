<!DOCTYPE html>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>

body{
margin:0;
background:#111;
color:white;
font-family:Arial;
}

header{
background:#e50914;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
}

.player{
padding:10px;
text-align:center;
position:sticky;
top:0;
background:#111;
z-index:10;
}

video{
width:100%;
max-height:500px;
background:black;
border-radius:10px;
}

button{
background:#e50914;
color:white;
border:none;
padding:10px 15px;
margin:5px;
border-radius:10px;
cursor:pointer;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
gap:10px;
padding:10px;
}

.card{
background:#222;
padding:10px;
border-radius:12px;
text-align:center;
cursor:pointer;
transition:all 0.3s ease;
}

.card:hover{
background:#444;
transform:scale(1.02);
}

/* সক্রিয় চ্যানেলের জন্য লাল স্টাইল */
.card.active{
background:#e50914;
box-shadow:0 0 15px rgba(229,9,20,0.5);
}

.card.active:hover{
background:#ff0a1a;
}

.card img{
width:70px;
height:70px;
object-fit:contain;
}

h3{
font-size:14px;
margin:5px 0 0 0;
}

/* POPUP */
#popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.85);
display:flex;
justify-content:center;
align-items:center;
z-index:99999;
}

#popup img{
width:90%;
max-width:350px;
border-radius:12px;
}

/* নোটিফিকেশন স্টাইল */
.notification{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#e50914;
color:white;
padding:10px 20px;
border-radius:30px;
font-size:14px;
z-index:10000;
animation:fadeOut 2s ease forwards;
}

@keyframes fadeOut{
0%{opacity:1;}
70%{opacity:1;}
100%{opacity:0;visibility:hidden;}
}

</style>
</head>

<script>

let video=document.getElementById("video");
let hls;
let currentActiveCard=null;

/* নোটিফিকেশন দেখানোর ফাংশন */
function showNotification(channelName){
let oldNoti=document.querySelector('.notification');
if(oldNoti) oldNoti.remove();
let noti=document.createElement('div');
noti.className='notification';
noti.innerText='▶ এখন চলছে: '+channelName;
document.body.appendChild(noti);
setTimeout(()=>{
if(noti) noti.remove();
},2000);
}

/* চ্যানেল প্লে করার ফাংশন */
function playChannel(element, url){
// আগের সক্রিয় কার্ড থেকে active ক্লাস সরানো
if(currentActiveCard){
currentActiveCard.classList.remove('active');
}
// নতুন কার্ডে active ক্লাস যোগ করা
element.classList.add('active');
currentActiveCard=element;

// চ্যানেলের নাম সংগ্রহ করে নোটিফিকেশন দেখানো
let channelName=element.querySelector('h3').innerText;
showNotification(channelName);

// ভিডিও প্লে করা
if(hls){
hls.destroy();
}

if(Hls.isSupported()){
hls=new Hls();
hls.loadSource(url);
hls.attachMedia(video);
hls.on(Hls.Events.MANIFEST_PARSED,function(){
video.play();
});
}else{
video.src=url;
video.play();
}
}

/* AUTO START - এখন Somoy TV FIFA চ্যানেলটি অটো প্লে হবে */
window.onload=function(){

setTimeout(()=>{
document.getElementById("popup").style.display="none";
},2000);

// Somoy TV FIFA কার্ডটি সিলেক্ট করা (পজিশন ৬ নম্বরে আছে, 0 থেকে শুরু করলে 5)
let allCards=document.querySelectorAll('.card');
let somoyFifaCard=allCards[5]; // কারণ নতুন ২টি যোগ হওয়ায় Somoy FIFA ৬ষ্ঠ অবস্থানে
  
if(somoyFifaCard){
let somoyFifaUrl=somoyFifaCard.getAttribute('data-url');
playChannel(somoyFifaCard, somoyFifaUrl);
}
}

/* পুরনো play ফাংশন রেখে দিলাম ব্যাকঅপ হিসেবে */
function play(url){
if(hls){
hls.destroy();
}
if(Hls.isSupported()){
hls=new Hls();
hls.loadSource(url);
hls.attachMedia(video);
hls.on(Hls.Events.MANIFEST_PARSED,function(){
video.play();
});
}else{
video.src=url;
video.play();
}
}

/* FULLSCREEN FIX */
function fullScreen(){
if(video.requestFullscreen){
video.requestFullscreen();
}
else if(video.webkitEnterFullscreen){
video.webkitEnterFullscreen();
}
}

/* EXPAND MODE */
function expand(){
let p=document.querySelector(".player");

if(p.style.position!="fixed"){
p.style.position="fixed";
p.style.top="0";
p.style.left="0";
p.style.width="100vw";
p.style.height="100vh";
p.style.background="black";
p.style.zIndex="99999";
}else{
p.style.position="sticky";
}
}

</script>
