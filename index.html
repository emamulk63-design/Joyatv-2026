<!DOCTYPE html>

<title>জয়া ভাইয়ের লাইভ টিভি</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
margin:0;
background:#111;
color:white;
font-family:Arial;
}

header{
background:#e50914;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
}

.player{
padding:10px;
text-align:center;
position:sticky;
top:0;
background:#111;
z-index:10;
}

/* ভিডিও কন্টেইনার */
.video-container{
width:100%;
background:black;
border-radius:10px;
overflow:hidden;
position:relative;
}

video{
width:100%;
height:auto;
max-height:500px;
background:black;
display:block;
object-fit:contain;
}

/* ফুলস্ক্রিন মোডের জন্য স্টাইল */
video:fullscreen{
width:100vw;
height:100vh;
max-height:100vh;
object-fit:contain;
background:black;
}

video:-webkit-full-screen{
width:100%;
height:100%;
object-fit:contain;
}

button{
background:#e50914;
color:white;
border:none;
padding:10px 15px;
margin:5px;
border-radius:10px;
cursor:pointer;
font-size:14px;
}

button:hover{
background:#ff0a1a;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
gap:10px;
padding:10px;
max-height:calc(100vh - 400px);
overflow-y:auto;
}

.card{
background:#222;
padding:10px;
border-radius:12px;
text-align:center;
cursor:pointer;
transition:all 0.3s ease;
}

.card:hover{
background:#444;
transform:scale(1.02);
}

/* সক্রিয় চ্যানেলের জন্য লাল স্টাইল */
.card.active{
background:#e50914;
box-shadow:0 0 15px rgba(229,9,20,0.5);
}

.card.active:hover{
background:#ff0a1a;
}

.card img{
width:70px;
height:70px;
object-fit:contain;
display:block;
margin:0 auto;
}

h3{
font-size:14px;
margin:5px 0 0 0;
}

/* POPUP */
#popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
display:flex;
justify-content:center;
align-items:center;
z-index:99999;
cursor:pointer;
}

#popup img{
width:90%;
max-width:350px;
border-radius:12px;
}

/* নোটিফিকেশন স্টাইল */
.notification{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#e50914;
color:white;
padding:10px 20px;
border-radius:30px;
font-size:14px;
z-index:10000;
animation:fadeOut 2s ease forwards;
}

@keyframes fadeOut{
0%{opacity:1;transform:translateX(-50%) translateY(0);}
70%{opacity:1;}
100%{opacity:0;transform:translateX(-50%) translateY(20px);visibility:hidden;}
}

/* স্ক্রলবার স্টাইল */
.container::-webkit-scrollbar{
width:5px;
}
.container::-webkit-scrollbar-track{
background:#222;
}
.container::-webkit-scrollbar-thumb{
background:#e50914;
border-radius:10px;
}

@media (max-width:768px){
.card img{
width:50px;
height:50px;
}
h3{
font-size:12px;
}
}
</style>
</head>

<body>

<!-- POPUP - ক্লিক করলেই চলে যাবে -->
<div id="popup" onclick="closePopup()">
<img src="https://raw.githubusercontent.com/emamulk63-design/Fifawarldcup2026/main/IMG_20260610_184322_866.jpg">

<script>

let video=document.getElementById("video");
let hls;
let currentActiveCard=null;

/* পপআপ বন্ধ */
function closePopup(){
document.getElementById("popup").style.display="none";
}

/* নোটিফিকেশন দেখানোর ফাংশন */
function showNotification(channelName){
let oldNoti=document.querySelector('.notification');
if(oldNoti) oldNoti.remove();
let noti=document.createElement('div');
noti.className='notification';
noti.innerText='▶ এখন চলছে: '+channelName;
document.body.appendChild(noti);
setTimeout(()=>{
if(noti) noti.remove();
},2000);
}

/* চ্যানেল প্লে করার ফাংশন */
function playChannel(element, url){
// আগের সক্রিয় কার্ড থেকে active ক্লাস সরানো
if(currentActiveCard){
currentActiveCard.classList.remove('active');
}
// নতুন কার্ডে active ক্লাস যোগ করা
element.classList.add('active');
currentActiveCard=element;

// চ্যানেলের নাম সংগ্রহ করে নোটিফিকেশন দেখানো
let channelName=element.querySelector('h3').innerText;
showNotification(channelName);

// ভিডিও প্লে করা
if(hls){
hls.destroy();
}

if(Hls.isSupported()){
hls=new Hls();
hls.loadSource(url);
hls.attachMedia(video);
hls.on(Hls.Events.MANIFEST_PARSED,function(){
video.play();
});
}else{
video.src=url;
video.play();
}
}

/* ফুলস্ক্রিন - সম্পূর্ণ ঠিক করা */
function fullScreen(){
if(video.requestFullscreen){
video.requestFullscreen();
}
else if(video.webkitRequestFullscreen){
video.webkitRequestFullscreen();
}
else if(video.msRequestFullscreen){
video.msRequestFullscreen();
}
// সাফারি মোবাইলের জন্য
else if(video.webkitEnterFullscreen){
video.webkitEnterFullscreen();
}
}

/* এক্সপান্ড মোড */
function expand(){
let p=document.querySelector(".player");

if(p.style.position!="fixed"){
p.style.position="fixed";
p.style.top="0";
p.style.left="0";
p.style.width="100%";
p.style.height="100%";
p.style.background="black";
p.style.zIndex="99999";
p.style.padding="10px";
// ভিডিও পুরো স্ক্রিনে দেখানোর জন্য
let videoContainer=document.querySelector('.video-container');
videoContainer.style.height="calc(100% - 60px)";
video.style.height="100%";
video.style.maxHeight="100%";
video.style.objectFit="contain";
}else{
p.style.position="sticky";
p.style.background="#111";
let videoContainer=document.querySelector('.video-container');
videoContainer.style.height="auto";
video.style.height="auto";
video.style.maxHeight="500px";
video.style.objectFit="contain";
}
}

/* AUTO START - প্রথম চ্যানেলটি লাল করে দিয়ে চালু করা */
window.onload=function(){

// 2 সেকেন্ড পর পপআপ বন্ধ হবে
setTimeout(()=>{
closePopup();
},2500);

// প্রথম কার্ডটি সিলেক্ট করা (T Sports HD)
let firstCard=document.querySelector('.card');
if(firstCard){
let firstUrl=firstCard.getAttribute('data-url');
playChannel(firstCard, firstUrl);
}
}

/* ফুলস্ক্রিন চেঞ্জ হলে লিসেনার */
document.addEventListener('fullscreenchange', exitHandler);
document.addEventListener('webkitfullscreenchange', exitHandler);
document.addEventListener('mozfullscreenchange', exitHandler);
document.addEventListener('MSFullscreenChange', exitHandler);

function exitHandler(){
if(!document.fullscreenElement && !document.webkitFullscreenElement){
// ফুলস্ক্রিন এক্সিট করলে ভিডিও নরমাল সাইজে ফিরে যাবে
video.style.width="100%";
video.style.height="auto";
}
}

</script>
